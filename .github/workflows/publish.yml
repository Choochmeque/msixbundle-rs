name: Publish

on:
  push:
    tags:
      - "v*.*.*"         # e.g. v1.2.3
  workflow_dispatch:      # allow manual runs

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc, aarch64-pc-windows-msvc

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
        name: Publish msixbundle
      - run: cargo publish -p msixbundle
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index update
        run: Start-Sleep -Seconds 10

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth_cli
        name: Publish msixbundle-cli
      - run: cargo publish -p msixbundle-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth_cli.outputs.token }}

      - name: Build msixbundle-cli for x86_64-pc-windows-msvc
        run: cargo build --release -p msixbundle-cli --target x86_64-pc-windows-msvc

      - name: Build msixbundle-cli for aarch64-pc-windows-msvc
        run: cargo build --release -p msixbundle-cli --target aarch64-pc-windows-msvc

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Build npm sidecar package
        run: node packaging/npm/build-sidecar.mjs

      - name: Publish npm sidecar
        run: npm publish --access public --provenance
        working-directory: packaging/npm/dist
